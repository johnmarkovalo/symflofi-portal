name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx eslint .
      - run: npx tsc --noEmit
      - run: npm test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  deploy:
    name: Deploy Production
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: symflo
          SENTRY_PROJECT: symflofi-cloud

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Set release variables
        id: vars
        run: echo "release=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Package standalone build
        run: |
          # Find the server.js inside standalone (path varies by environment)
          SERVER_DIR=$(find .next/standalone -name "server.js" -path "*/SymfloFi-Cloud/*" -exec dirname {} \; | head -1)
          if [ -z "$SERVER_DIR" ]; then
            # Fallback: server.js at root of standalone
            SERVER_DIR=".next/standalone"
          fi
          echo "Standalone dir: $SERVER_DIR"

          mkdir -p deploy
          cp -r "$SERVER_DIR"/* deploy/
          cp -r "$SERVER_DIR"/node_modules deploy/ 2>/dev/null || true

          # Copy .next/static into the .next dir
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static

          # Copy BUILD_ID and other required .next files from standalone
          if [ -d "$SERVER_DIR/.next" ]; then
            cp -r "$SERVER_DIR/.next"/* deploy/.next/
          fi

          [ -d public ] && cp -r public deploy/public || true
          tar -czf release.tar.gz -C deploy .

      - name: Upload release to server
        run: |
          RELEASE=${{ steps.vars.outputs.release }}
          DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}
          SSH="ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}"

          # Create release directory
          $SSH "mkdir -p $DEPLOY_PATH/releases/$RELEASE"

          # Upload and extract
          scp -i ~/.ssh/deploy_key release.tar.gz \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:$DEPLOY_PATH/releases/$RELEASE/
          $SSH "cd $DEPLOY_PATH/releases/$RELEASE && tar -xzf release.tar.gz && rm release.tar.gz"

          # Symlink shared .env
          $SSH "ln -sf $DEPLOY_PATH/shared/.env $DEPLOY_PATH/releases/$RELEASE/.env"

          # Switch current symlink
          $SSH "ln -sfn $DEPLOY_PATH/releases/$RELEASE $DEPLOY_PATH/current"

          # Restart PM2 (delete + start to update cwd to new release)
          $SSH "pm2 delete symflofi-portal 2>/dev/null; cd $DEPLOY_PATH/current && PORT=3001 HOSTNAME=127.0.0.1 pm2 start server.js --name symflofi-portal --cwd $DEPLOY_PATH/current && pm2 save"

          # Cleanup old releases (keep last 5)
          $SSH "cd $DEPLOY_PATH/releases && ls -1t | tail -n +6 | xargs -r rm -rf"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
